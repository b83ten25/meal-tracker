name: Build Tauri App

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: false
          prerelease: false

  create-updater-json:
    needs: publish-tauri
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets and create latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          VERSION=${TAG#v}

          # Get signatures
          WIN_SIG=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            "https://github.com/$REPO/releases/download/$TAG/MealTracker_${VERSION}_x64-setup.exe.zip.sig")
          MAC_SIG=$(curl -sL -H "Authorization: token $GITHUB_TOKEN" \
            "https://github.com/$REPO/releases/download/$TAG/MealTracker_${VERSION}_aarch64.dmg.sig")

          # Create latest.json
          cat > latest.json << EOF
          {
            "version": "$VERSION",
            "notes": "",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "url": "https://github.com/$REPO/releases/download/$TAG/MealTracker_${VERSION}_x64-setup.exe",
                "signature": "$WIN_SIG"
              },
              "darwin-aarch64": {
                "url": "https://github.com/$REPO/releases/download/$TAG/MealTracker_${VERSION}_aarch64.dmg",
                "signature": "$MAC_SIG"
              }
            }
          }
          EOF

          # Upload to release
          gh release upload $TAG latest.json --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
